name: Automation file

on:
  push:
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print Hello
        run: echo "Hello GitHub Action"

      - name: Show Date
        run: date

      - name: Show Current Directory
        run: pwd

      - name: Show Current User
        run: whoami

      - name: List Files
        run: ls -la

  test:
    runs-on: ubuntu-latest
    needs: hello

    steps:
      - name: Test Phase
        run: echo "Running test cases"

  deploy:
  runs-on: ubuntu-latest
  needs: test

  steps:
    - name: Deploy the App
      run: echo "Deploying the application"

    
    - name: Send Success Email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ Workflow Success"
        body: "GitHub Actions workflow completed successfully."
        to: sachintiwari74gpj@gmail.com,tiwariisachin94gpj@gmail.com
        from: ${{ secrets.EMAIL_USERNAME }}

   
    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "❌ Workflow Failed"
        body: "GitHub Actions workflow failed. Please check the Actions logs."
        to: sachintiwari74gpj@gmail.com,tiwariisachin94gpj@gmail.com
        from: ${{ secrets.EMAIL_USERNAME }}